<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>La Palma 3D Terrain Map</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; }
        
        /* Floating UI Menu Styles */
        #menu {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10;
        }
        #menu h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
            text-align: center;
        }
        #menu hr {
            border: 0; 
            border-top: 1px solid #ccc; 
            margin: 10px 0;
        }
        #menu-content {
            /* Set a max-height taller than your content will ever be */
            max-height: 500px; 
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
        #menu-content.collapsed {
            max-height: 0;
        }
        #menu-toggle-btn {
            text-align: center;
            cursor: pointer;
            margin-top: 5px;
            padding-top: 5px;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #eee;
            transition: color 0.2s;
        }
        #menu-toggle-btn:hover {
            color: #000;
        }
        .layer-toggle {
            display: block;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
            color: #444;
        }
        .layer-toggle input {
            margin-right: 8px;
        }

        
    </style>
</head>
<body>

<div id="map"></div>

<div id="menu">
    <h3>Settings</h3>
    <div id="menu-content">
        <label class="layer-toggle">
            <input type="checkbox" id="toggle-3d" checked> 3D Mode
        </label>
        
        <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">

        <h3 style="font-size: 14px; margin: 5px 0; text-align: left;">Fire layer</h3>
        
        <label class="layer-toggle">
            <input type="radio" name="overlay-switch" value="type" checked> Fire type
        </label>
        <label class="layer-toggle">
            <input type="radio" name="overlay-switch" value="severity"> Fire severity
        </label>
        <label class="layer-toggle">
            <input type="radio" name="overlay-switch" value="none"> None
        </label>

        <div id="legend-container" style="margin-top: 10px; text-align: center;">
            <img id="legend-img" src="./data/type_legend.png" alt="Map Legend" style="max-width: 100%; border-radius: 4px; border: 1px solid #ddd; display: block;">
        </div>

        <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">

        <label class="layer-toggle">
            <input type="checkbox" id="toggle-boundary" checked> Firearea
        </label>

        <label class="layer-toggle" id="label-hillshade">
            <input type="checkbox" id="toggle-hillshade" checked> Hillshade
        </label>
<!-- <h3>Understory metrics</h3>
        <hr style="border: 0; border-top: 1px solid #ccc; margin: 10px 0;">
        
        
        <label class="layer-toggle">
            <input type="checkbox" id="toggle-lad" checked> LAD < 3m
        </label> -->
    
    </div>
    <div id="menu-toggle-btn" title="Collapse/Expand Menu">▲</div>

</div>

<script>
    // 1. Initialize the Map
    // --- USER CONFIGURATION ---
    // ENTER YOUR QGIS COORDINATES HERE:
   const map = new maplibregl.Map({
        container: 'map',
        style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
        // Centered exactly between your North/South and East/West bounds
        center: [-17.93796, 28.73665], 
        zoom: 12.5,
        pitch: 75, // Tilt it further down
    maxPitch: 85, // Allow the user to tilt it almost completely flat
    bearing: -15
    });

    // Your QGIS Export Bounds
    const NORTH = 28.788878098; 
    const SOUTH = 28.684435000; 
    const EAST = -17.881355482; 
    const WEST = -17.994567935;

    // MapLibre expects: [Top-Left, Top-Right, Bottom-Right, Bottom-Left]
    const laPalmaCoordinates = [
        [WEST, NORTH], // Top-Left
        [EAST, NORTH], // Top-Right
        [EAST, SOUTH], // Bottom-Right
        [WEST, SOUTH]  // Bottom-Left
    ];
    map.on('load', () => {
        // --- ADD 3D TERRAIN ---
        map.addSource('terrain-source', {
            type: 'raster-dem',
            tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
            encoding: 'terrarium',
            tileSize: 256,
            maxzoom: 14
        });
        map.setTerrain({ source: 'terrain-source', exaggeration: 1.5 });

        // Source 2: Identical, but dedicated entirely to the hillshade shadows
        map.addSource('hillshade-source', {
            type: 'raster-dem',
            tiles: ['https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png'],
            encoding: 'terrarium',
            tileSize: 256,
            maxzoom: 14
        });
        
        map.setTerrain({ source: 'terrain-source', exaggeration: 1.5 });

        
        // --- ADD HILLSHADE ---
        map.addLayer({
            id: 'layer-hillshade',
            type: 'hillshade',
            source: 'hillshade-source',
            paint: {
                'hillshade-exaggeration': 0.8, // Adjusts the intensity of the shadows (0.0 to 1.0)
                'hillshade-shadow-color': '#1a1a1a', // Darkens the shadows slightly
                'hillshade-illumination-direction': 315 // Simulates the sun coming from the North-West
            }
        });

        // --- ADD IMAGE OVERLAYS ---
        // Severity Image Source & Layer
        map.addSource('severity-img', {
            type: 'image',
            url: './data/dndvi.png',
            coordinates: laPalmaCoordinates
        });
        map.addLayer({
            id: 'layer-severity',
            type: 'raster',
            source: 'severity-img',
            layout: {
                'visibility': 'none' // Hide this on load so it doesn't mix with Severity!
            },
            paint: { 'raster-opacity': 0.9 }
        });

        // Type Image Source & Layer
        map.addSource('type-img', {
            type: 'image',
            url: './data/firetype.png',
            coordinates: laPalmaCoordinates
        });
        map.addLayer({
            id: 'layer-type',
            type: 'raster',
            source: 'type-img',
            paint: { 'raster-opacity': 0.9 }
        });

        /* map.addSource('lad-data', {
            type: 'geojson',
            data: './data/lad.geojson'
        });

        map.addLayer({
            id: 'layer-lad',
            type: 'fill-extrusion',
            source: 'lad-data',
            paint: {
            'fill-extrusion-color': [
                    'interpolate',
                    ['linear'],
                    ['get', 'VALUE'], // The field we are evaluating
                    
                    // If VALUE is 0 -> Transparent (Alpha 0)
                    0, 'rgba(44, 162, 95, 0)',   
                    
                    // If VALUE is 1.5 -> Nice visible green (Alpha 0.6)
                    1, 'rgba(44, 162, 95, 0.6)', 
                    
                    // If VALUE is 3.0 -> Almost black (Alpha 0.95)
                    2, 'rgba(15, 15, 15, 0.95)'

            'fill-extrusion-opacity': 0.6,
            'fill-extrusion-height': [
                '*',
                ['get', 'VALUE'], // Grabs the exact double value from QGIS
                25 // Multiply by your desired visual scale
            ],
            'fill-extrusion-base': 0,
            'fill-extrusion-vertical-gradient': false
        }
        });

        map.addLayer({
            id: 'layer-lad-2d',
            type: 'circle',
            source: 'lad-data',
            layout: {
                // Hide it initially since the map starts in 3D
                'visibility': 'none' 
            },
            paint: {
                // 1. Map the Size (Radius) to the LAD value
                'circle-radius': [
                    'interpolate', ['linear'], ['get', 'VALUE'],
                    0, 0,   // LAD 0 = 0 pixel radius (invisible)
                    3, 3   // LAD 3 = 10 pixel radius (adjust this if you want bigger/smaller dots)
                ],
                
                // 2. Keep the exact same color mapping you used for the 3D columns!
                'circle-color': 
                    '#000000',
                
                // Prevent the circles from having harsh edges
                'circle-blur': 0.2
            }
        });
 */

        // --- ADD GEOJSON BOUNDARY ---
        map.addSource('boundary-data', {
            type: 'geojson',
            data: './data/boundary.geojson'
        });
        map.addLayer({
            id: 'layer-boundary',
            type: 'line',
            source: 'boundary-data',
            layout: {
                'line-join': 'round',
                'line-cap': 'round'
            },
            paint: {
                'line-color': '#ff0000',
                'line-width': 10
            }
        });
    });

    map.addControl(new maplibregl.NavigationControl({
    visualizePitch: true // Changes the compass to a 3D icon when tilted
}), 'top-right');

    // 2. Set up the UI Menu Toggle Logic
    const toggleLayer = (checkboxId, layerId) => {
        document.getElementById(checkboxId).addEventListener('change', (e) => {
            const visibility = e.target.checked ? 'visible' : 'none';
            if (map.getLayer(layerId)) {
                map.setLayoutProperty(layerId, 'visibility', visibility);
            }
        });
    };

    // Bind checkboxes to map layers
    const overlayRadios = document.querySelectorAll('input[name="overlay-switch"]');
    const legendImg = document.getElementById('legend-img');

    overlayRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
            const selectedOverlay = e.target.value;
            
            // 1. Turn both map layers off first to reset
            if (map.getLayer('layer-severity')) map.setLayoutProperty('layer-severity', 'visibility', 'none');
            if (map.getLayer('layer-type')) map.setLayoutProperty('layer-type', 'visibility', 'none');
            
            // 2. Turn on the selected layer and update the legend picture
            if (selectedOverlay === 'severity') {
                if (map.getLayer('layer-severity')) map.setLayoutProperty('layer-severity', 'visibility', 'visible');
                legendImg.src = './data/severity_legend.png'; // Ensure this matches your file name
                legendImg.style.display = 'block'; // Show the image
                
            } else if (selectedOverlay === 'type') {
                if (map.getLayer('layer-type')) map.setLayoutProperty('layer-type', 'visibility', 'visible');
                legendImg.src = './data/type_legend.png'; // Ensure this matches your file name
                legendImg.style.display = 'block'; // Show the image
                
            } else {
                // If "None" is selected, just hide the legend entirely
                legendImg.style.display = 'none';
            }
        });
    });
    toggleLayer('toggle-boundary', 'layer-boundary');
toggleLayer('toggle-hillshade', 'layer-hillshade');

let lastPitch = 60; 
    let animationId;

    // 2. Upgraded function to animate BOTH terrain mesh and shadow intensity
    function animate3DTransition(startTerrain, endTerrain, startShadows, endShadows, duration, callback) {
        let startTime = null;
        
        function step(timestamp) {
            if (!startTime) startTime = timestamp;
            const progress = Math.min((timestamp - startTime) / duration, 1);
            
            // Ease-in-out effect for a natural feel
            const easeProgress = progress < 0.5 
                ? 2 * progress * progress 
                : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                
            const currentTerrain = startTerrain + (endTerrain - startTerrain) * easeProgress;
            const currentShadows = startShadows + (endShadows - startShadows) * easeProgress;
            
            // Update the physical 3D mesh
            map.setTerrain({ source: 'terrain-source', exaggeration: currentTerrain });
            
            // Update the shadow intensity paint property
            if (map.getLayer('layer-hillshade')) {
                map.setPaintProperty('layer-hillshade', 'hillshade-exaggeration', currentShadows);
            }
            
            if (progress < 1) {
                animationId = requestAnimationFrame(step);
            } else if (callback) {
                callback(); 
            }
        }
        
        cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(step);
    }

    // 3. The Toggle Logic
    document.getElementById('toggle-3d').addEventListener('change', (e) => {
        const is3D = e.target.checked;
        const hillshadeLabel = document.getElementById('label-hillshade'); // Grab the label
        
        if (is3D) {
            // --- TURN ON SEQUENCE ---
            // Reveal the hillshade menu toggle immediately
           // if (document.getElementById('toggle-lad').checked) {
             //   if (map.getLayer('layer-lad-2d')) map.setLayoutProperty('layer-lad-2d', 'visibility', 'none');
             //   if (map.getLayer('layer-lad')) map.setLayoutProperty('layer-lad', 'visibility', 'visible');
          //  }

            if (hillshadeLabel) hillshadeLabel.style.display = 'block';

            if (map.getLayer('layer-hillshade')) {
                map.setPaintProperty('layer-hillshade', 'hillshade-exaggeration', 0);
                map.setLayoutProperty('layer-hillshade', 'visibility', 'visible');
            }
            
            animate3DTransition(0, 1.5, 0, 0.8, 800, () => {
                map.easeTo({ pitch: lastPitch, duration: 1000 });
            });
            
        } else {
            // --- TURN OFF SEQUENCE ---
            // Hide the hillshade menu toggle immediately 
            if (hillshadeLabel) hillshadeLabel.style.display = 'none';

            //if (document.getElementById('toggle-lad').checked) {
             //   if (map.getLayer('layer-lad')) map.setLayoutProperty('layer-lad', 'visibility', 'none');
           //     if (map.getLayer('layer-lad-2d')) map.setLayoutProperty('layer-lad-2d', 'visibility', 'visible');
            //}
            lastPitch = map.getPitch() > 5 ? map.getPitch() : 60;
            
            map.easeTo({ pitch: 0, duration: 1000 });
            
            map.once('moveend', () => {
                if (document.getElementById('toggle-3d').checked) return;
                
                animate3DTransition(1.5, 0, 0.8, 0, 800, () => {
                    if (map.getLayer('layer-hillshade')) {
                        map.setLayoutProperty('layer-hillshade', 'visibility', 'none');
                    }
                });
            });
        }
    });


// 1. Checkbox Toggle
   /*  document.getElementById('toggle-lad').addEventListener('change', (e) => {
        const isLadVisible = e.target.checked;
        const is3DMode = document.getElementById('toggle-3d').checked; // Check 3D state
        
        if (isLadVisible) {
            // Turn on the correct layer based on the 3D toggle
            if (map.getLayer('layer-lad')) {
                map.setLayoutProperty('layer-lad', 'visibility', is3DMode ? 'visible' : 'none');
            }
            if (map.getLayer('layer-lad-2d')) {
                map.setLayoutProperty('layer-lad-2d', 'visibility', is3DMode ? 'none' : 'visible');
            }
        } else {
            // Turn both off
            if (map.getLayer('layer-lad')) map.setLayoutProperty('layer-lad', 'visibility', 'none');
            if (map.getLayer('layer-lad-2d')) map.setLayoutProperty('layer-lad-2d', 'visibility', 'none');
        }
    }); */

    const menuContent = document.getElementById('menu-content');
    const menuToggleBtn = document.getElementById('menu-toggle-btn');
    let isMenuCollapsed = false;

    menuToggleBtn.addEventListener('click', () => {
        isMenuCollapsed = !isMenuCollapsed;
        
        if (isMenuCollapsed) {
            menuContent.classList.add('collapsed');
            menuToggleBtn.innerHTML = '▼'; // Down arrow when collapsed
            // Optional: Remove bottom margin from h3 when collapsed so it looks perfectly neat
            document.querySelector('#menu h3').style.marginBottom = '0';
        } else {
            menuContent.classList.remove('collapsed');
            menuToggleBtn.innerHTML = '▲'; // Up arrow when expanded
            document.querySelector('#menu h3').style.marginBottom = '10px';
        }
    });
   
</script>
</body>
</html>
